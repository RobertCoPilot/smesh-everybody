name: Dev CI/CD - Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: dev-vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy-dev:
    name: Build and deploy dev
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Validate deployment secrets
        run: |
          test -n "${{ secrets.VERCEL_TOKEN }}" || (echo "Missing GitHub secret VERCEL_TOKEN" && exit 1)
          test -n "$VERCEL_ORG_ID" || (echo "Missing GitHub secret VERCEL_ORG_ID" && exit 1)
          test -n "$VERCEL_PROJECT_ID" || (echo "Missing GitHub secret VERCEL_PROJECT_ID" && exit 1)

      - name: Pull Vercel dev project settings
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy dev project to Vercel
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
