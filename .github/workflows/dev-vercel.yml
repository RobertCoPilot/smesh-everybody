name: Dev CI/CD - Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: dev-vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy-dev:
    name: Build and deploy dev
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Validate deployment secrets
        run: |
          test -n "${{ secrets.VERCEL_TOKEN }}" || (echo "Missing GitHub secret VERCEL_TOKEN" && exit 1)
          test -n "$VERCEL_ORG_ID" || (echo "Missing GitHub secret VERCEL_ORG_ID" && exit 1)
          test -n "$VERCEL_PROJECT_ID" || (echo "Missing GitHub secret VERCEL_PROJECT_ID" && exit 1)

      - name: Pull Vercel dev project settings
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Validate pulled Vercel env
        run: |
          ENV_FILE=.vercel/.env.production.local
          test -f "$ENV_FILE" || (echo "Vercel env file was not created by vercel pull" && exit 1)
          for name in \
            NEXT_PUBLIC_FIREBASE_API_KEY \
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN \
            NEXT_PUBLIC_FIREBASE_PROJECT_ID \
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET \
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID \
            NEXT_PUBLIC_FIREBASE_APP_ID
          do
            grep -q "^$name=" "$ENV_FILE" || (echo "Missing Vercel project env var: $name" && exit 1)
          done
          grep -Eq '^NEXT_PUBLIC_FIREBASE_PROJECT_ID="?smesh-everybody-dev"?$' "$ENV_FILE" || (echo "Vercel project must point at smesh-everybody-dev" && exit 1)

      - name: Build with Vercel
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy dev project to Vercel
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
